<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 11 июня 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --progress-color: #58a6ff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: var(--progress-color);
    z-index: 9999;
    transition: width 0.1s linear;
  }

  /* Masthead */
  .masthead {
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(3rem, 8vw, 8rem);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(88,166,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3rem, 12vw, 10rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.9;
    color: #fff;
    text-transform: uppercase;
  }

  .masthead-date {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 3vw, 1.8rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.45);
    margin-top: 2rem;
    text-transform: uppercase;
  }

  .masthead-rule {
    width: 80px;
    height: 2px;
    background: rgba(255,255,255,0.2);
    margin: 2.5rem auto;
  }

  /* Quiet day spread */
  .quiet-day {
    background: #050810;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(3rem, 8vw, 8rem);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '○';
    position: absolute;
    font-size: 60vw;
    color: rgba(255,255,255,0.015);
    font-family: 'Fraunces', serif;
    pointer-events: none;
    line-height: 1;
  }

  .quiet-label {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.7rem, 1.5vw, 0.9rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 2rem;
  }

  .quiet-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 14vw, 12rem);
    font-weight: 300;
    font-style: italic;
    line-height: 0.9;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.03em;
  }

  .quiet-sub {
    margin-top: 3rem;
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2vw, 1.25rem);
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    max-width: 480px;
    line-height: 1.7;
  }

  .quiet-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(88,166,255,0.5);
    margin: 3rem auto 0;
  }

  /* Footer */
  footer {
    background: #000;
    padding: clamp(2rem, 5vw, 4rem) clamp(3rem, 8vw, 8rem);
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.05em;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  footer a {
    color: rgba(88,166,255,0.6);
    text-decoration: none;
  }
  footer a:hover { color: #58a6ff; }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- Masthead -->
<section class="masthead">
  <div class="masthead-title">Tourism<br>Digest</div>
  <div class="masthead-rule"></div>
  <div class="masthead-date">11 июня 2026</div>
</section>

<!-- Quiet Day -->
<section class="quiet-day">
  <div class="quiet-label">Выпуск · 11 июня 2026</div>
  <div class="quiet-headline">Тихий<br>день</div>
  <p class="quiet-sub">Сегодня в каналах @tourdom и @atorus не было новостей, достойных дайджеста. Возвращайтесь завтра.</p>
  <div class="quiet-dot"></div>
</section>

<footer>
  Tourism Digest &nbsp;•&nbsp;
  <a href="https://t.me/tourdom" target="_blank">@tourdom</a> &nbsp;•&nbsp;
  <a href="https://t.me/atorus" target="_blank">@atorus</a> &nbsp;•&nbsp;
  Сгенерировано автоматически
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  document.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = pct + '%';
  });
</script>

</body>
</html>
