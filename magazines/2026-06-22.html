<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 22 июня 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --progress-color: #58a6ff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0d1117;
    color: #e8f4f8;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: var(--progress-color);
    z-index: 9999;
    transition: width 0.1s linear;
  }

  /* Masthead */
  .masthead {
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 8vw, 8rem);
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #000 70%);
  }

  .masthead-content {
    position: relative;
    z-index: 1;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3rem, 10vw, 9rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.9;
    color: #fff;
    text-transform: uppercase;
  }

  .masthead-rule {
    width: 60%;
    max-width: 400px;
    height: 1px;
    background: #333;
    margin: 2rem auto;
  }

  .masthead-date {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: #888;
    text-transform: uppercase;
  }

  /* Quiet day section */
  .quiet-day {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 8vw, 8rem);
    background: #080c10;
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '◦';
    position: absolute;
    font-size: 40vw;
    color: #0d1a0d;
    font-family: 'Fraunces', serif;
    line-height: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    user-select: none;
  }

  .quiet-day-inner {
    position: relative;
    z-index: 1;
    max-width: 600px;
  }

  .quiet-day-kicker {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #4a9a6a;
    margin-bottom: 2rem;
  }

  .quiet-day-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    color: #c8e6c9;
    margin-bottom: 2rem;
  }

  .quiet-day-body {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1.1rem, 2vw, 1.3rem);
    font-weight: 300;
    color: #6a8a6a;
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 3rem;
  }

  .quiet-day-meta {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: #2a4a2a;
  }

  /* Footer */
  footer {
    background: #000;
    padding: clamp(2rem, 5vw, 4rem) clamp(3rem, 8vw, 8rem);
    text-align: center;
    border-top: 1px solid #1a1a1a;
  }

  footer p {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: #444;
    text-transform: uppercase;
  }

  footer a {
    color: #58a6ff;
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- Masthead -->
<section class="masthead">
  <div class="masthead-content">
    <h1 class="masthead-title">Tourism<br>Digest</h1>
    <div class="masthead-rule"></div>
    <p class="masthead-date">22 июня 2026</p>
  </div>
</section>

<!-- Quiet Day -->
<section class="quiet-day">
  <div class="quiet-day-inner">
    <p class="quiet-day-kicker">Выпуск от 22 июня 2026</p>
    <h2 class="quiet-day-headline">Тихий<br>день</h2>
    <p class="quiet-day-body">
      Сегодня каналы @tourdom и @atorus хранят молчание.<br>
      Новостей за прошедшие сутки не поступало.
    </p>
    <p class="quiet-day-meta">@tourdom · @atorus · 0 материалов</p>
  </div>
</section>

<!-- Footer -->
<footer>
  <p>Tourism Digest &bull; <a href="https://t.me/tourdom">@tourdom</a> &bull; <a href="https://t.me/atorus">@atorus</a> &bull; Сгенерировано автоматически</p>
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = pct + '%';
  }, { passive: true });
</script>

</body>
</html>
