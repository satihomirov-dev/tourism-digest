<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 29 мая 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --progress-color: #58a6ff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1.1rem, 1.5vw, 1.25rem);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: var(--progress-color);
    z-index: 9999;
    transition: width 0.1s linear;
  }

  /* Masthead */
  .masthead {
    min-height: 100vh;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: clamp(3rem, 8vw, 8rem);
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(88,166,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(201,24,74,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 12vw, 10rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.95;
    position: relative;
    z-index: 1;
  }

  .masthead-date {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 1.5rem;
    position: relative;
    z-index: 1;
  }

  .masthead-rule {
    width: clamp(4rem, 12vw, 10rem);
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 2rem auto;
    position: relative;
    z-index: 1;
  }

  /* Quiet day section */
  .quiet-day {
    min-height: 100vh;
    background: #06080d;
    color: #e8f4f8;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: clamp(3rem, 8vw, 8rem);
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '◌';
    position: absolute;
    font-family: 'Fraunces', serif;
    font-size: clamp(12rem, 35vw, 30rem);
    color: rgba(88,166,255,0.04);
    line-height: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    user-select: none;
  }

  .quiet-day-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(4rem, 14vw, 11rem);
    font-weight: 900;
    font-style: italic;
    line-height: 0.95;
    letter-spacing: -0.03em;
    position: relative;
    z-index: 1;
  }

  .quiet-day-sub {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 300;
    color: rgba(232,244,248,0.45);
    margin-top: 2rem;
    letter-spacing: 0.1em;
    position: relative;
    z-index: 1;
  }

  .quiet-day-channels {
    display: flex;
    gap: 2rem;
    margin-top: 3rem;
    position: relative;
    z-index: 1;
  }

  .quiet-day-channels a {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: #58a6ff;
    text-decoration: none;
    letter-spacing: 0.05em;
    border: 1px solid rgba(88,166,255,0.3);
    padding: 0.5rem 1.2rem;
    border-radius: 2rem;
    transition: background 0.2s, border-color 0.2s;
  }

  .quiet-day-channels a:hover {
    background: rgba(88,166,255,0.1);
    border-color: #58a6ff;
  }

  /* Footer */
  footer {
    background: #000;
    color: rgba(255,255,255,0.35);
    text-align: center;
    padding: 2.5rem clamp(2rem, 6vw, 6rem);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    font-family: 'Inter', sans-serif;
  }

  footer a {
    color: rgba(255,255,255,0.5);
    text-decoration: none;
  }

  footer a:hover {
    color: #58a6ff;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- Masthead -->
<section class="masthead">
  <div class="masthead-title">TOURISM<br>DIGEST</div>
  <div class="masthead-rule"></div>
  <div class="masthead-date">29 мая 2026</div>
</section>

<!-- Quiet Day -->
<section class="quiet-day">
  <div class="quiet-day-headline">Тихий<br>день</div>
  <div class="quiet-day-sub">Новостей за вчера не поступало</div>
  <div class="quiet-day-channels">
    <a href="https://t.me/tourdom" target="_blank" rel="noopener">@tourdom</a>
    <a href="https://t.me/atorus" target="_blank" rel="noopener">@atorus</a>
  </div>
</section>

<!-- Footer -->
<footer>
  Tourism Digest &nbsp;•&nbsp;
  <a href="https://t.me/tourdom" target="_blank" rel="noopener">@tourdom</a> &nbsp;•&nbsp;
  <a href="https://t.me/atorus" target="_blank" rel="noopener">@atorus</a> &nbsp;•&nbsp;
  Сгенерировано автоматически
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  function updateProgress() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = pct + '%';
  }
  window.addEventListener('scroll', updateProgress, { passive: true });
  updateProgress();
</script>
</body>
</html>
