<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 29 мая 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pad: clamp(3rem, 8vw, 8rem);
  --body-size: clamp(1.1rem, 1.5vw, 1.4rem);
}

body {
  font-family: 'Inter', sans-serif;
  font-size: var(--body-size);
  overflow-x: hidden;
}

/* ── Masthead ── */
.masthead {
  background: #fff;
  border-bottom: 3px solid #111;
  padding: 2.5rem var(--pad) 2rem;
  display: flex;
  align-items: baseline;
  gap: 2rem;
  flex-wrap: wrap;
}
.masthead-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.2rem, 6vw, 5rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  color: #111;
  line-height: 1;
}
.masthead-date {
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.9rem, 1.5vw, 1.1rem);
  font-weight: 500;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ── Section header ── */
.section-header {
  background: #111;
  padding: 1.5rem var(--pad);
}
.section-header-inner {
  max-width: 960px;
  margin: 0 auto;
}
.channel-tag {
  font-family: 'Inter', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: #e8f4f8;
  letter-spacing: 0.05em;
}

/* ── Spread base ── */
.spread {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.spread-inner {
  max-width: 960px;
  width: 100%;
  margin: 0 auto;
  padding: var(--pad);
  position: relative;
  z-index: 2;
}
.label {
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  color: #aaa;
}
.body-text {
  font-size: var(--body-size);
  line-height: 1.75;
  margin-top: 1.5rem;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── 1. Lead ── */
.spread-lead { background: #fff; }
.headline-giant {
  font-family: 'Fraunces', serif;
  font-size: clamp(2rem, 5vw, 4.5rem);
  font-weight: 900;
  line-height: 1.1;
  color: #111;
  letter-spacing: -0.02em;
}
.spread-lead .body-text { color: #333; }

/* ── 2. Midnight ── */
.spread-midnight { background: #0d1117; }
.accent-blue { color: #58a6ff !important; }
.headline-midnight {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.8rem, 4vw, 3.8rem);
  font-weight: 700;
  line-height: 1.15;
  color: #e8f4f8;
}
.spread-midnight .body-text { color: #c9d1d9; }

/* ── 3. Rose ── */
.spread-rose { background: #fff0f3; }
.deco-quote {
  font-family: 'Fraunces', serif;
  font-size: clamp(8rem, 20vw, 18rem);
  font-weight: 900;
  color: #ffc2d1;
  line-height: 0.8;
  position: absolute;
  top: var(--pad);
  left: calc(var(--pad) - 2rem);
  z-index: 1;
  pointer-events: none;
  user-select: none;
}
.spread-rose .spread-inner { position: relative; z-index: 2; }
.accent-rose { color: #c9184a !important; }
.headline-rose {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.8rem, 4vw, 3.5rem);
  font-weight: 700;
  line-height: 1.15;
  color: #c9184a;
}
.spread-rose .body-text { color: #3d0020; }

/* ── 4. Terminal ── */
.spread-terminal { background: #0a0a0a; }
.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,255,136,0.03) 3px,
    rgba(0,255,136,0.03) 4px
  );
  pointer-events: none;
  z-index: 1;
}
.term-label { color: #00ff88 !important; font-family: 'Courier New', monospace; }
.headline-term {
  font-family: 'Courier New', monospace;
  font-size: clamp(1.2rem, 2.5vw, 2.2rem);
  font-weight: 400;
  line-height: 1.4;
  color: #00ff88;
  word-break: break-word;
}
.term-body {
  font-family: 'Courier New', monospace;
  color: #7fff7f;
  font-size: clamp(0.95rem, 1.3vw, 1.15rem);
}

/* ── 5. Academic ── */
.spread-academic { background: #faf8f2; }
.headline-academic {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.8rem, 3.5vw, 3rem);
  font-weight: 700;
  line-height: 1.2;
  color: #1a1209;
}
.ruled-line {
  border-top: 1px solid #c8b88a;
  margin: 1.2rem 0;
}
.academic-body {
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: #2a2010;
}
.footnote-num {
  font-size: 0.75em;
  vertical-align: super;
  margin-right: 0.25em;
  color: #8a6a20;
}

/* ── 6. Stats ── */
.spread-stats { background: #1a237e; }
.stats-label { color: rgba(255,255,255,0.5) !important; }
.hero-number {
  font-family: 'Fraunces', serif;
  font-size: clamp(6rem, 20vw, 18rem);
  font-weight: 900;
  color: rgba(255,255,255,0.15);
  line-height: 0.85;
  letter-spacing: -0.04em;
}
.hero-caption {
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 2rem;
}
.headline-stats {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.5rem, 3vw, 2.8rem);
  font-weight: 700;
  line-height: 1.2;
  color: #fff;
}
.stats-body { color: rgba(255,255,255,0.75); }

/* ── Quiet day ── */
.spread-quiet {
  background: #f5f5f0;
  min-height: 100vh;
}
.quiet-inner {
  text-align: center;
  padding-top: 15vh;
}
.quiet-icon {
  font-size: 5rem;
  color: #bbb;
  margin-bottom: 2rem;
}
.quiet-headline {
  font-family: 'Fraunces', serif;
  font-size: clamp(3rem, 8vw, 7rem);
  font-weight: 900;
  color: #333;
  letter-spacing: -0.02em;
}
.quiet-sub {
  font-family: 'Inter', sans-serif;
  font-size: 1.1rem;
  color: #888;
  margin-top: 1.5rem;
}

/* ── Footer ── */
footer {
  background: #111;
  color: #666;
  padding: 2.5rem var(--pad);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  text-align: center;
  letter-spacing: 0.05em;
}
footer a { color: #888; text-decoration: none; }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-title">TOURISM DIGEST</div>
  <div class="masthead-date">29 мая 2026</div>
</header>


<section class="spread spread-quiet">
  <div class="spread-inner quiet-inner">
    <div class="quiet-icon">◌</div>
    <h2 class="quiet-headline">Тихий день</h2>
    <p class="quiet-sub">Новостей за вчера не поступало</p>
  </div>
</section>

<footer>
  Tourism Digest &bull; @tourdom &bull; @atorus &bull; Сгенерировано автоматически
</footer>

</body>
</html>
