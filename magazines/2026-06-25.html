<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 25 июня 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #58a6ff;
    --progress-h: 3px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1.1rem, 2vw, 1.25rem);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: var(--progress-h);
    width: 0%;
    background: var(--accent);
    z-index: 9999;
    transition: width 0.1s linear;
  }

  /* ── MASTHEAD ── */
  .masthead {
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(3rem, 8vw, 8rem);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 40%, rgba(88,166,255,0.08) 0%, transparent 70%);
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 12vw, 10rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.9;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .masthead-date {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 2rem;
    position: relative;
    z-index: 1;
  }

  .masthead-line {
    width: 60px;
    height: 1px;
    background: rgba(255,255,255,0.3);
    margin: 2rem auto;
    position: relative;
    z-index: 1;
  }

  /* ── QUIET DAY spread ── */
  .quiet-day {
    background: #080c10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(3rem, 8vw, 8rem);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '◦';
    position: absolute;
    font-size: 40vw;
    color: rgba(255,255,255,0.02);
    font-family: 'Fraunces', serif;
    line-height: 1;
    pointer-events: none;
  }

  .quiet-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(4rem, 14vw, 12rem);
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.03em;
    line-height: 0.9;
    margin-bottom: 2rem;
  }

  .quiet-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.15em;
    max-width: 480px;
    line-height: 1.8;
  }

  .quiet-accent {
    width: 1px;
    height: 80px;
    background: rgba(88,166,255,0.4);
    margin: 3rem auto;
  }

  /* ── FOOTER ── */
  footer {
    background: #0d1117;
    color: rgba(255,255,255,0.4);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 3rem clamp(2rem, 8vw, 8rem);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  footer span {
    color: rgba(88,166,255,0.7);
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- MASTHEAD -->
<section class="masthead">
  <h1 class="masthead-title">Tourism<br>Digest</h1>
  <div class="masthead-line"></div>
  <p class="masthead-date">25 июня 2026</p>
</section>

<!-- QUIET DAY -->
<section class="quiet-day">
  <h2 class="quiet-title">Тихий<br>день</h2>
  <div class="quiet-accent"></div>
  <p class="quiet-subtitle">
    Вчера в каналах <span style="color:rgba(88,166,255,0.7)">@tourdom</span> и <span style="color:rgba(88,166,255,0.7)">@atorus</span> новостей не поступало.<br>
    Следующий выпуск — завтра.
  </p>
</section>

<!-- FOOTER -->
<footer>
  Tourism Digest &nbsp;•&nbsp; <span>@tourdom</span> &nbsp;•&nbsp; <span>@atorus</span> &nbsp;•&nbsp; Сгенерировано автоматически
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  document.addEventListener('scroll', () => {
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    bar.style.width = scrollHeight > 0 ? (scrollTop / scrollHeight * 100) + '%' : '0%';
  });
</script>
</body>
</html>
