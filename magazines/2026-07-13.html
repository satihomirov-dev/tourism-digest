<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tourism Digest — 13 июля 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --ink: #1c1c1e;
  --ink-2: #48484a;
  --ink-3: #8e8e93;
  --accent: #1c1c1e;
  --rule: #e0dfd9;
  --font-serif: 'Fraunces', Georgia, serif;
  --font-sans: 'Inter', system-ui, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

#bar {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--ink); width: 0%; z-index: 999;
  transition: width .1s linear;
}

/* MASTHEAD */
.masthead {
  background: var(--ink);
  color: #fff;
  padding: 3rem 2rem 2.5rem;
  text-align: center;
  border-bottom: 1px solid #333;
}
.masthead h1 {
  font-family: var(--font-serif);
  font-size: clamp(2.8rem, 8vw, 6rem);
  font-weight: 700;
  letter-spacing: -.03em;
  line-height: 1;
}
.masthead .date-ru {
  margin-top: .6rem;
  font-size: .85rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.45);
}
.masthead .total {
  margin-top: .4rem;
  font-size: .78rem;
  color: rgba(255,255,255,.25);
  letter-spacing: .08em;
}

/* LAYOUT */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 1.5rem 4rem;
}

/* CHANNEL HEADER */
.ch-header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  padding: 2.5rem 0 1rem;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 0;
}
.ch-name {
  font-family: var(--font-serif);
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -.01em;
}
.ch-count {
  font-size: .78rem;
  color: var(--ink-3);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* CARD */
.card {
  padding: 1.5rem 0;
  border-bottom: 1px solid var(--rule);
  display: grid;
  grid-template-columns: 2rem 1fr;
  grid-template-rows: auto auto auto;
  column-gap: 1.25rem;
  row-gap: .4rem;
}
.card-num {
  font-family: var(--font-serif);
  font-size: .8rem;
  color: var(--ink-3);
  padding-top: .35rem;
  font-weight: 300;
  font-style: italic;
}
.card h2 {
  font-family: var(--font-serif);
  font-size: clamp(1.15rem, 2.5vw, 1.4rem);
  font-weight: 700;
  line-height: 1.3;
  color: var(--ink);
  grid-column: 2;
}
.card .body {
  font-size: .95rem;
  color: var(--ink-2);
  line-height: 1.65;
  grid-column: 2;
}
.card-source {
  grid-column: 2;
  font-size: .72rem;
  color: var(--ink-3);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-top: .25rem;
}

/* EMPTY STATE */
.empty {
  padding: 5rem 0;
  text-align: center;
  color: var(--ink-3);
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-style: italic;
}

footer {
  border-top: 1px solid var(--rule);
  padding: 1.5rem;
  text-align: center;
  font-size: .75rem;
  color: var(--ink-3);
  letter-spacing: .06em;
  background: var(--bg);
}
footer a { color: var(--ink-2); text-decoration: none; }
footer a:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .card { grid-template-columns: 1.5rem 1fr; column-gap: .75rem; }
}
</style>
</head>
<body>
<div id="bar"></div>
<script>window.addEventListener('scroll',()=>{const d=document.documentElement;document.getElementById('bar').style.width=(d.scrollTop/(d.scrollHeight-d.clientHeight)*100)+'%'})</script>
<header class="masthead">
  <h1>Tourism Digest</h1>
  <div class="date-ru">13 июля 2026</div>
  <div class="total">0 новостей &bull; @tourdom &bull; @atorus</div>
</header>
<div class="container">
<div class="empty">Новостей за 13 июля 2026 не поступало.</div>
</div>
<footer>
  Tourism Digest &bull;
  <a href="https://t.me/tourdom">@tourdom</a> &bull;
  <a href="https://t.me/atorus">@atorus</a> &bull;
  Сгенерировано автоматически
</footer>
</body>
</html>
