<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 4 июня 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --progress-color: #58a6ff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: var(--progress-color);
    z-index: 1000;
    transition: width 0.1s linear;
  }

  /* Masthead */
  .masthead {
    min-height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 8vw, 8rem);
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #111 0%, #000 70%);
    pointer-events: none;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3rem, 10vw, 9rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.95;
    color: #fff;
    position: relative;
    z-index: 1;
  }

  .masthead-rule {
    width: clamp(60px, 15vw, 120px);
    height: 2px;
    background: #fff;
    margin: 2rem auto;
    position: relative;
    z-index: 1;
  }

  .masthead-date {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #aaa;
    position: relative;
    z-index: 1;
  }

  /* Тихий день spread */
  .quiet-day {
    min-height: 100vh;
    background: #080c14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 8vw, 8rem);
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '~';
    position: absolute;
    font-family: 'Fraunces', serif;
    font-size: 40vw;
    color: rgba(255,255,255,0.02);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .quiet-day-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #58a6ff;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
  }

  .quiet-day-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 12vw, 10rem);
    font-weight: 800;
    line-height: 1;
    color: #e8f4f8;
    position: relative;
    z-index: 1;
    letter-spacing: -0.03em;
  }

  .quiet-day-sub {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 300;
    color: #6e7681;
    margin-top: 2.5rem;
    max-width: 500px;
    line-height: 1.7;
    position: relative;
    z-index: 1;
  }

  .quiet-day-dots {
    display: flex;
    gap: 0.5rem;
    margin-top: 3rem;
    position: relative;
    z-index: 1;
  }

  .quiet-day-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #30363d;
    animation: pulse 2s ease-in-out infinite;
  }

  .quiet-day-dots span:nth-child(2) { animation-delay: 0.3s; }
  .quiet-day-dots span:nth-child(3) { animation-delay: 0.6s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); background: #58a6ff; }
  }

  /* Footer */
  footer {
    background: #000;
    color: #6e7681;
    text-align: center;
    padding: 3rem clamp(1.5rem, 5vw, 4rem);
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.05em;
    border-top: 1px solid #21262d;
  }

  footer a {
    color: #58a6ff;
    text-decoration: none;
  }

  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- Masthead -->
<section class="masthead">
  <h1 class="masthead-title">TOURISM<br>DIGEST</h1>
  <div class="masthead-rule"></div>
  <p class="masthead-date">4 июня 2026</p>
</section>

<!-- Тихий день -->
<section class="quiet-day">
  <p class="quiet-day-eyebrow">Выпуск от 4 июня 2026</p>
  <h2 class="quiet-day-headline">Тихий<br>день</h2>
  <p class="quiet-day-sub">Сегодня каналы @tourdom и @atorus не опубликовали новостей. Возвращайтесь завтра — путешествия продолжаются.</p>
  <div class="quiet-day-dots">
    <span></span><span></span><span></span>
  </div>
</section>

<footer>
  Tourism Digest &nbsp;•&nbsp;
  <a href="https://t.me/tourdom" target="_blank">@tourdom</a> &nbsp;•&nbsp;
  <a href="https://t.me/atorus" target="_blank">@atorus</a> &nbsp;•&nbsp;
  Сгенерировано автоматически
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  document.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';
  });
</script>
</body>
</html>
