<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 30 мая 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --progress-color: #58a6ff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    width: 0%;
    background: var(--progress-color);
    z-index: 1000;
    transition: width 0.1s linear;
  }

  /* Masthead */
  .masthead {
    min-height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(3rem, 8vw, 8rem);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(88, 166, 255, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .masthead-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.65rem, 1.5vw, 0.85rem);
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 2rem;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 14vw, 13rem);
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -0.03em;
    color: #fff;
    margin-bottom: 3rem;
  }

  .masthead-rule {
    width: clamp(4rem, 12vw, 10rem);
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 0 auto 2.5rem;
  }

  .masthead-date {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.4rem, 4vw, 2.8rem);
    font-weight: 300;
    font-style: italic;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.02em;
  }

  /* Quiet day section */
  .quiet-day {
    min-height: 100vh;
    background: #04060a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(3rem, 8vw, 8rem);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '◌';
    position: absolute;
    font-size: clamp(20rem, 60vw, 60rem);
    color: rgba(255,255,255,0.015);
    font-family: 'Fraunces', serif;
    line-height: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    user-select: none;
  }

  .quiet-day-label {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.65rem, 1.5vw, 0.8rem);
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(88, 166, 255, 0.6);
    margin-bottom: 3rem;
  }

  .quiet-day-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(4rem, 16vw, 14rem);
    font-weight: 800;
    line-height: 0.9;
    color: #fff;
    letter-spacing: -0.04em;
    margin-bottom: 3.5rem;
    position: relative;
    z-index: 1;
  }

  .quiet-day-sub {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2vw, 1.25rem);
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    max-width: 36ch;
    line-height: 1.7;
    position: relative;
    z-index: 1;
  }

  /* Stars decoration */
  .stars {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }

  .star {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(88, 166, 255, 0.5);
    animation: pulse 3s ease-in-out infinite;
  }
  .star:nth-child(2) { animation-delay: 0.8s; }
  .star:nth-child(3) { animation-delay: 1.6s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* Footer */
  footer {
    background: #000;
    color: rgba(255,255,255,0.25);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 3rem clamp(2rem, 6vw, 6rem);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  footer span {
    color: rgba(255,255,255,0.12);
    margin: 0 0.5rem;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- Masthead -->
<section class="masthead">
  <p class="masthead-eyebrow">Ежедневный журнал об индустрии туризма</p>
  <h1 class="masthead-title">TOURISM<br>DIGEST</h1>
  <div class="masthead-rule"></div>
  <p class="masthead-date">30 мая 2026</p>
</section>

<!-- Quiet day -->
<section class="quiet-day">
  <p class="quiet-day-label">Выпуск дня</p>
  <div class="stars">
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
  </div>
  <h2 class="quiet-day-headline">Тихий<br>день</h2>
  <p class="quiet-day-sub">Сегодня каналы @tourdom и @atorus отдыхают. Новостей нет — и это тоже новость.</p>
</section>

<!-- Footer -->
<footer>
  Tourism Digest <span>•</span> @tourdom <span>•</span> @atorus <span>•</span> Сгенерировано автоматически
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  function updateProgress() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = pct + '%';
  }
  window.addEventListener('scroll', updateProgress, { passive: true });
</script>

</body>
</html>
