<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 2 июня 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --progress-color: #58a6ff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    width: 0%;
    background: var(--progress-color);
    z-index: 9999;
    transition: width 0.1s linear;
  }

  section {
    min-height: 100vh;
    padding: clamp(3rem, 8vw, 8rem);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Masthead */
  .masthead {
    background: #000;
    color: #fff;
    align-items: center;
    text-align: center;
    gap: 2rem;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 12vw, 10rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    text-transform: uppercase;
  }

  .masthead-date {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 3vw, 1.8rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    margin-top: 1rem;
  }

  .masthead-rule {
    width: clamp(4rem, 20vw, 12rem);
    height: 1px;
    background: #333;
    margin: 1.5rem auto;
  }

  /* Quiet day — dark elegant spread */
  .quiet-day {
    background: #080c10;
    color: #e0e8ef;
    align-items: center;
    text-align: center;
    gap: 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '✦';
    position: absolute;
    font-size: 40vw;
    color: #ffffff06;
    font-family: 'Fraunces', serif;
    pointer-events: none;
    user-select: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .quiet-day-label {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.75rem, 2vw, 1rem);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #58a6ff;
    font-weight: 500;
  }

  .quiet-day-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    font-weight: 300;
    font-style: italic;
    line-height: 1.1;
    color: #c8d8e8;
  }

  .quiet-day-body {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 300;
    color: #6e8899;
    max-width: 56ch;
    margin: 0 auto;
    line-height: 1.8;
  }

  .quiet-day-divider {
    width: 3rem;
    height: 1px;
    background: #1e3a5f;
    margin: 0 auto;
  }

  /* Footer */
  footer {
    background: #0d1117;
    color: #484f58;
    text-align: center;
    padding: clamp(2rem, 5vw, 4rem) clamp(3rem, 8vw, 8rem);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    min-height: auto;
  }

  footer a {
    color: #58a6ff;
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }

  .footer-links {
    margin-top: 0.75rem;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- Masthead -->
<section class="masthead">
  <div>
    <div class="masthead-title">Tourism<br>Digest</div>
    <div class="masthead-rule"></div>
    <div class="masthead-date">2 июня 2026</div>
  </div>
</section>

<!-- Тихий день -->
<section class="quiet-day">
  <div class="quiet-day-label">Выпуск от 2 июня 2026</div>
  <div class="quiet-day-headline">Тихий день</div>
  <div class="quiet-day-divider"></div>
  <p class="quiet-day-body">
    Сегодня каналы <strong style="color:#8ab4cc">@tourdom</strong> и <strong style="color:#8ab4cc">@atorus</strong>
    хранят молчание. Новостей за вчерашний день не поступало — или они ещё в пути.
    Следующий выпуск выйдет завтра.
  </p>
</section>

<footer>
  <div>Tourism Digest &nbsp;•&nbsp; <a href="https://t.me/tourdom">@tourdom</a> &nbsp;•&nbsp; <a href="https://t.me/atorus">@atorus</a></div>
  <div class="footer-links">
    <span>Сгенерировано автоматически</span>
  </div>
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  function updateProgress() {
    const scrolled = window.scrollY;
    const total = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = total > 0 ? (scrolled / total * 100) + '%' : '0%';
  }
  window.addEventListener('scroll', updateProgress, { passive: true });
  updateProgress();
</script>

</body>
</html>
