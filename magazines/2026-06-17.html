<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 17 июня 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --progress-color: #58a6ff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: var(--progress-color);
    z-index: 9999;
    transition: width 0.1s linear;
  }

  /* Masthead */
  .masthead {
    min-height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 8vw, 8rem);
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #111 0%, #000 70%);
  }

  .masthead-content {
    position: relative;
    z-index: 1;
  }

  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(3rem, 10vw, 9rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #fff;
    line-height: 1;
    margin-bottom: 1.5rem;
  }

  .masthead .date {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
  }

  .masthead .tagline {
    margin-top: 3rem;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: #444;
    text-transform: uppercase;
  }

  /* Quiet day spread */
  .quiet-day {
    min-height: 100vh;
    background: #080810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 8vw, 8rem);
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '◎';
    position: absolute;
    font-size: 40vw;
    color: rgba(255,255,255,0.015);
    font-family: 'Fraunces', serif;
    line-height: 1;
    user-select: none;
  }

  .quiet-day-content {
    position: relative;
    z-index: 1;
  }

  .quiet-day h2 {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 12vw, 10rem);
    font-weight: 700;
    font-style: italic;
    color: #e8e8e8;
    line-height: 1;
    margin-bottom: 2rem;
  }

  .quiet-day p {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2vw, 1.25rem);
    color: #555;
    max-width: 40ch;
    line-height: 1.8;
    font-weight: 300;
  }

  .quiet-day .channels {
    margin-top: 3rem;
    display: flex;
    gap: 2rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .quiet-day .channel-badge {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: #333;
    border: 1px solid #222;
    padding: 0.5rem 1.2rem;
    border-radius: 999px;
    text-transform: uppercase;
  }

  /* Footer */
  footer {
    background: #000;
    color: #333;
    text-align: center;
    padding: 3rem clamp(2rem, 5vw, 5rem);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    border-top: 1px solid #111;
  }

  footer a {
    color: #444;
    text-decoration: none;
  }

  footer a:hover {
    color: #888;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- Masthead -->
<section class="masthead">
  <div class="masthead-content">
    <h1>TOURISM<br>DIGEST</h1>
    <div class="date">17 июня 2026</div>
    <div class="tagline">Туристическая пресса · Ежедневный дайджест</div>
  </div>
</section>

<!-- Quiet Day -->
<section class="quiet-day">
  <div class="quiet-day-content">
    <h2>Тихий день</h2>
    <p>Сегодня новостей из отслеживаемых каналов не поступало. Туристическая индустрия взяла паузу.</p>
    <div class="channels">
      <span class="channel-badge">@tourdom</span>
      <span class="channel-badge">@atorus</span>
    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  <p>Tourism Digest &nbsp;•&nbsp; <a href="https://t.me/tourdom">@tourdom</a> &nbsp;•&nbsp; <a href="https://t.me/atorus">@atorus</a> &nbsp;•&nbsp; Сгенерировано автоматически</p>
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  function updateProgress() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = progress + '%';
  }
  window.addEventListener('scroll', updateProgress, { passive: true });
  updateProgress();
</script>

</body>
</html>
