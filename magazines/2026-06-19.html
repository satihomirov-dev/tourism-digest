<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — 19 июня 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --progress-color: #58a6ff;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Reading progress bar */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: var(--progress-color);
    z-index: 9999;
    transition: width 0.1s linear;
  }

  /* Masthead */
  .masthead {
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(3rem, 8vw, 8rem);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(88,166,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(201,24,74,0.08) 0%, transparent 60%);
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3rem, 12vw, 10rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 0.9;
    position: relative;
    z-index: 1;
  }

  .masthead-date {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 3vw, 1.5rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 2rem;
    position: relative;
    z-index: 1;
  }

  /* Quiet day spread */
  .quiet-day {
    background: #0d0d0d;
    color: rgba(255,255,255,0.85);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(3rem, 8vw, 8rem);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .quiet-day::before {
    content: '✦';
    position: absolute;
    font-size: 40vw;
    color: rgba(255,255,255,0.02);
    font-family: 'Fraunces', serif;
    line-height: 1;
    pointer-events: none;
  }

  .quiet-day-headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
  }

  .quiet-day-sub {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2vw, 1.3rem);
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .quiet-day-divider {
    width: 60px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 2rem auto;
    position: relative;
    z-index: 1;
  }

  .quiet-day-note {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    color: rgba(255,255,255,0.3);
    max-width: 500px;
    line-height: 1.8;
    position: relative;
    z-index: 1;
  }

  /* Footer */
  footer {
    background: #111;
    color: rgba(255,255,255,0.35);
    text-align: center;
    padding: 3rem clamp(3rem, 8vw, 8rem);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
  }

  footer a {
    color: rgba(255,255,255,0.5);
    text-decoration: none;
  }

  footer a:hover {
    color: #fff;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<!-- Masthead -->
<section class="masthead">
  <h1 class="masthead-title">TOURISM<br>DIGEST</h1>
  <p class="masthead-date">19 июня 2026</p>
</section>

<!-- Quiet Day -->
<section class="quiet-day">
  <h2 class="quiet-day-headline">Тихий день</h2>
  <div class="quiet-day-divider"></div>
  <p class="quiet-day-sub">19 июня 2026</p>
  <div class="quiet-day-divider"></div>
  <p class="quiet-day-note">
    Сегодня новостей не поступало.<br>
    Каналы @tourdom и @atorus не опубликовали материалов за вчерашний день — либо источники были недоступны.
  </p>
</section>

<footer>
  Tourism Digest &nbsp;•&nbsp; <a href="https://t.me/tourdom">@tourdom</a> &nbsp;•&nbsp; <a href="https://t.me/atorus">@atorus</a> &nbsp;•&nbsp; Сгенерировано автоматически
</footer>

<script>
  const bar = document.getElementById('progress-bar');
  function updateProgress() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = pct + '%';
  }
  window.addEventListener('scroll', updateProgress, { passive: true });
  updateProgress();
</script>

</body>
</html>
