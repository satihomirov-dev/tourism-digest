<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism Digest — Архив</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,sans-serif;background:#f5f0e8;color:#1a1a1a;min-height:100vh}
  header{background:#1a1a1a;color:#f5f0e8;padding:3rem 2rem;text-align:center}
  h1{font-family:Fraunces,serif;font-size:clamp(2.5rem,6vw,5rem);letter-spacing:-0.02em}
  .sub{margin-top:0.5rem;font-size:1rem;opacity:0.6;letter-spacing:0.1em;text-transform:uppercase}
  main{max-width:800px;margin:4rem auto;padding:0 2rem}
  .issue{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0;border-bottom:1px solid #d4cec4}
  .issue a{font-family:Fraunces,serif;font-size:1.4rem;color:#1a1a1a;text-decoration:none}
  .issue a:hover{text-decoration:underline}
  .date{font-size:0.85rem;color:#888}
  .empty{text-align:center;padding:4rem 0;color:#888;font-style:italic}
</style>
</head>
<body>
<header>
  <h1>Tourism Digest</h1>
  <p class="sub">Ежедневный журнал о туризме</p>
</header>
<main id="issues">
  <p class="empty">Первый выпуск появится завтра утром.</p>
</main>
</body>
</html>
