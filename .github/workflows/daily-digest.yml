name: Daily Tourism Digest

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 Moscow time (UTC+3)
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate magazine
        run: python scripts/generate.py
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

      - name: Commit and push
        run: |
          git config user.email "digest-bot@tourism-digest.io"
          git config user.name "Tourism Digest Bot"
          git add magazines/
          git diff --staged --quiet || git commit -m "digest: $(python3 -c "
          from datetime import datetime,timedelta,timezone
          print((datetime.now(timezone(timedelta(hours=3)))-timedelta(days=1)).strftime('%Y-%m-%d'))
          ")"
          git push
